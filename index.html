<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Starbreaker Protocol</title>
  <meta
    name="description"
    content="Starbreaker Protocol is a cockpit shooter that sends sprite ships through a 3D hyperwarp tunnel."
  >
  <meta name="theme-color" content="#020204">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
</head>
<body>
  <main class="cockpit-shell">
    <canvas id="game" aria-label="Starbreaker Protocol 3D cockpit game viewport"></canvas>

    <div class="warp-glass" aria-hidden="true"></div>
    <div class="cockpit-frame" aria-hidden="true">
      <span class="frame-line top-left"></span>
      <span class="frame-line top-right"></span>
      <span class="frame-line bottom-left"></span>
      <span class="frame-line bottom-right"></span>
      <span class="visor-arc"></span>
    </div>

    <section class="hud hud-top" aria-label="Cockpit telemetry">
      <div class="brand-lockup">
        <span>STARBREAKER</span>
        <strong>PROTOCOL</strong>
      </div>
      <div class="mission-strip">
        <span id="waveValue">STANDBY</span>
        <strong id="statusValue">HYPERWARP READY</strong>
      </div>
      <div class="score-strip">
        <span>BEST <strong id="bestScoreTitle">0</strong></span>
        <span>SCORE <strong id="scoreValue">0</strong></span>
      </div>
    </section>

    <section class="hud hud-bottom" aria-label="Ship systems">
      <div class="meter-cluster">
        <article class="meter-card">
          <span>HULL</span>
          <strong id="hullValue">100</strong>
          <div class="meter"><div id="hullBar"></div></div>
        </article>
        <article class="meter-card">
          <span>EMP</span>
          <strong id="chargeValue">0%</strong>
          <div class="meter charge"><div id="chargeBar"></div></div>
        </article>
        <article class="meter-card">
          <span>COMBO</span>
          <strong id="comboValue">x1.0</strong>
          <div class="meter combo"><div id="comboBar"></div></div>
        </article>
      </div>

      <div class="target-strip">
        <span>TARGETS</span>
        <strong id="enemiesValue">0</strong>
      </div>

      <div class="action-cluster">
        <button type="button" class="icon-button" id="fullscreenButton" aria-label="Fullscreen" title="Fullscreen">
          <span>FULL</span>
        </button>
        <button type="button" class="icon-button" id="dashButton" aria-label="Dash" title="Dash">
          <span>DASH</span>
        </button>
        <button type="button" class="icon-button emp-button" id="overdriveButton" aria-label="EMP" title="EMP">
          <span>EMP</span>
        </button>
      </div>
    </section>

    <div class="boss-bar hidden" id="bossBarWrap" aria-label="Boss hull">
      <div class="boss-bar-label">
        <span id="bossName">BOSS</span>
        <span id="bossHpText">100%</span>
      </div>
      <div class="boss-track"><div id="bossBar"></div></div>
    </div>

    <div class="overlay intro" id="introOverlay">
      <div class="modal launch-modal">
        <p class="eyebrow">COCKPIT ONLINE</p>
        <h1>STARBREAKER PROTOCOL</h1>
        <button type="button" class="primary-button" id="startButton">LAUNCH</button>
      </div>
    </div>

    <div class="overlay hidden" id="upgradeOverlay">
      <div class="modal upgrade-modal">
        <p class="eyebrow">UPLINK</p>
        <h2 id="upgradePrompt">SELECT MOD</h2>
        <div class="upgrade-grid" id="upgradeGrid"></div>
      </div>
    </div>

    <div class="overlay hidden" id="pausedOverlay">
      <div class="modal small-modal">
        <p class="eyebrow">PAUSED</p>
        <h2>SYSTEMS HOLDING</h2>
        <button type="button" class="primary-button" id="resumeButton">RESUME</button>
      </div>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
      <div class="modal small-modal">
        <p class="eyebrow" id="gameOverEyebrow">RUN COMPLETE</p>
        <h2 id="gameOverTitle">MISSION RESULT</h2>
        <div class="result-grid">
          <article>
            <span>SCORE</span>
            <strong id="finalScore">0</strong>
          </article>
          <article>
            <span>BEST</span>
            <strong id="bestScore">0</strong>
          </article>
          <article>
            <span>WAVES</span>
            <strong id="wavesCleared">0</strong>
          </article>
        </div>
        <p class="result-line" id="gameOverMessage">SIGNAL STABLE</p>
        <button type="button" class="primary-button" id="replayButton">RELAUNCH</button>
      </div>
    </div>

    <div class="toast hidden" id="toast"></div>
  </main>

  <script src="game.js"></script>
</body>
</html>
