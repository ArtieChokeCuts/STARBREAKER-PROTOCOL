<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Starbreaker Protocol icon</title>
  <desc id="desc">A glowing interceptor shard crossing a bright star field.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06131d" />
      <stop offset="55%" stop-color="#0f2a42" />
      <stop offset="100%" stop-color="#122338" />
    </linearGradient>
    <linearGradient id="core" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#68e1ff" />
      <stop offset="100%" stop-color="#1fb8c9" />
    </linearGradient>
    <linearGradient id="flare" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7f4d" />
      <stop offset="100%" stop-color="#ffc95e" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="124" fill="url(#bg)" />
  <circle cx="384" cy="132" r="54" fill="#ffc95e" opacity="0.9" filter="url(#glow)" />
  <path d="M76 420L214 286L276 348L138 436Z" fill="url(#flare)" opacity="0.94" />
  <path d="M178 330L290 118L368 196L250 400L192 380L224 310Z" fill="url(#core)" filter="url(#glow)" />
  <path d="M300 122L410 62L350 172Z" fill="#ebf6ff" opacity="0.98" />
  <circle cx="114" cy="136" r="8" fill="#ebf6ff" opacity="0.84" />
  <circle cx="160" cy="90" r="5" fill="#68e1ff" opacity="0.82" />
  <circle cx="430" cy="232" r="6" fill="#ebf6ff" opacity="0.72" />
</svg>
